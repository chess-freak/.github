name: 기능 제안
description: 더 재미있거나 더 체스다운 아이디어를 제안할 때 사용합니다.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        조직 분위기에 맞는 제안이면 더 좋습니다. 체스와의 연결고리가 있으면 특히 환영합니다.
  - type: textarea
    id: problem
    attributes:
      label: 어떤 문제를 해결하나요?
      placeholder: 예) 초보자가 다음 수를 고르기 어렵습니다.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 어떤 기능을 원하나요?
      placeholder: 예) 수 추천 버튼, 오프닝 힌트, 악의적인 난이도 모드
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 고려한 대안
      description: 비슷한 해결책이 있다면 적어주세요.
      placeholder: 예) 단순 안내 문구, 튜토리얼, 자동 힌트
  - type: textarea
    id: notes
    attributes:
      label: 참고 사항
      description: 예상 UX, 구현 아이디어, 관련 링크 등
