name: 잡무 / 리팩터
description: 버그도 기능도 아닌, 유지보수성 향상을 위한 작업입니다.
title: "[Chore] "
labels:
  - chore
body:
  - type: markdown
    attributes:
      value: |
        티 안 나지만 중요한 작업입니다. 나중의 우리를 위해 적어주세요.
  - type: textarea
    id: scope
    attributes:
      label: 무엇을 바꾸나요?
      placeholder: 예) 컴포넌트 구조 정리, 네이밍 정리, 중복 제거
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: 왜 필요한가요?
      placeholder: 예) 지금은 돌아가지만 유지보수가 어렵습니다.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: 영향 범위
      description: 깨질 수 있는 부분이나 주의할 점
      placeholder: 예) UI 변경 없음, 테스트 수정 필요
